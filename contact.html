<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      overflow-x: hidden;
    }

    .contact-hero {
      position: relative;
      height: 42vh;
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      display: block;
      margin-top: -500px;
    }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 8%;
      transform: translateY(-50%);
      color: #4b3a2f;
    }

    .hero-text h1 {
      font-size: 5rem;
      font-weight: 400;
      font-family: 'Cormorant Garamond', serif;
      margin: 0;
    }

  </style>

</head>

<body>

  <section class="contact-hero">

    <img src="contact.png" class="hero-image">

    <div class="hero-text">
      <h1>Contact</h1>
    </div>

  </section>

</body>

</html>
